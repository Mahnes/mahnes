<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mahnes</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', sans-serif; background: #f5f2e8; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
    .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
    .input-group { display: flex; gap: 5px; margin-bottom: 20px; }
    input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
    button.main-btn { background: #3a3a3a; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 800; }
    .options { display: none; flex-direction: column; gap: 10px; }
    .opt-btn { background: #eee; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 700; text-align: left; }
    .opt-btn:hover { background: #7ec87e; color: white; }
    #status { margin-top: 15px; text-align: center; font-size: 14px; color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <div class="input-group">
      <input type="text" id="urlInput" placeholder="Link yapıştır...">
      <button class="main-btn" onclick="showOptions()">SEÇ</button>
    </div>
    <div id="options" class="options">
      <button class="opt-btn" onclick="download(false, '1080')">🎬 1080p Video</button>
      <button class="opt-btn" onclick="download(false, '720')">🎬 720p Video</button>
      <button class="opt-btn" onclick="download(true)">🎵 MP3 Ses</button>
    </div>
    <div id="status"></div>
  </div>

  <script>
    let videoUrl = '';
    function showOptions() {
      videoUrl = document.getElementById('urlInput').value;
      if(videoUrl) document.getElementById('options').style.display = 'flex';
    }
    async function download(isMp3, quality) {
      const status = document.getElementById('status');
      status.innerText = "⏳ Hazırlanıyor...";
      try {
        const res = await fetch('/download', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ url: videoUrl, mp3: isMp3, quality: quality })
        });
        const data = await res.json();
        if(data.redirectUrl) {
          window.location.href = data.redirectUrl;
          status.innerText = "✅ İndirme başladı!";
        } else { throw new Error(data.error); }
      } catch(e) {
        status.innerText = "❌ Hata: " + e.message;
      }
    }
  </script>
</body>
</html>
